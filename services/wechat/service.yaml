name: wechat
version: "latest"
description: "Personal WeChat REST API via WeChatFerry (per-person, Windows VM)"
category: tools
author: sunapi386
license: MIT
homepage: https://github.com/sunapi386/wechat

requires:
  gpu: false
  # WeChatFerry is Windows-only DLL injection. requires.arch is CPU arch only;
  # the Windows-only constraint is documented in the description, README, and tags.
  arch: [amd64]

ports:
  - host: 8000
    container: 8000
    protocol: tcp
    description: Authenticated WeChat REST API (X-API-Key header)

config:
  - name: WCF_API_KEY
    description: API key for the X-API-Key header (generated by provision/bootstrap.ps1)
    required: true

health_check:
  endpoint: /health
  port: 8000
  interval: "30s"
  timeout: "5s"
  retries: 3

tags:
  - wechat
  - messaging
  - personal
  - windows-only
