[project]
name = "kokoro-service"
version = "0.1.0"
description = "Kokoro text-to-speech HTTP service for Citadel nodes (EN + ZH, cache + receipts)"
requires-python = ">=3.10"
dependencies = [
    # Kokoro-82M synthesis + the misaki G2P frontends for English and Mandarin.
    "kokoro>=0.9.4",
    "misaki[en,zh]>=0.9.4",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.0",
    "numpy>=1.26",
]

[tool.ruff]
line-length = 100
