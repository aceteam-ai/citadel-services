# GPU override for the Kokoro TTS service. Layer it on top of compose.yml on an
# NVIDIA node:
#
#     docker compose -f compose.yml -f compose.gpu.yml up -d
#
# This ONLY exposes the GPU to the container (the nvidia runtime device
# reservation, same mechanism ollama/vllm use). The server already selects CUDA
# at runtime when a GPU is visible (KOKORO_DEVICE=auto), so no other change is
# needed. Use a CUDA-built image for real acceleration:
#     docker build --build-arg TORCH_BACKEND=cu124 -t ghcr.io/aceteam-ai/kokoro-service:cuda ./build
# (the default :latest image is CPU-torch and will run on CPU even with a GPU
# reserved). See README "GPU".
#
# citadel note: `citadel module install` runs a bare `docker compose up` on
# compose.yml only, so wiring this override into the citadel-managed GPU path is
# a follow-up in citadel-cli (parallel to the port registration) -- see README
# "Fabric seam".
services:
  kokoro:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
