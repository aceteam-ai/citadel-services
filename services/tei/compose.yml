services:
  tei:
    image: ${TEI_IMAGE:-ghcr.io/huggingface/text-embeddings-inference:86-1.9}
    ports:
      - "8102:80"
    volumes:
      - ~/citadel-cache/huggingface:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model-id ${EMBED_MODEL:-Alibaba-NLP/gte-multilingual-base}
      --dtype float16
      --auto-truncate
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
