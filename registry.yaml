version: 1
services:
  - name: ollama
    version: "latest"
    category: inference
    gpu: optional
    description: "Local LLM runner with model management"
  - name: vllm
    version: "0.23.0"
    category: inference
    gpu: required
    description: "High-performance LLM inference with PagedAttention"
  - name: llamacpp
    version: "latest"
    category: inference
    gpu: optional
    description: "Lightweight GGUF model inference server"
  - name: tei
    version: "1.9"
    category: inference
    gpu: required
    description: "Text embeddings (HF TEI), OpenAI-compatible /v1/embeddings"
    tags: [embeddings, inference, openai-compatible, multilingual, gpu]
  - name: gliner2
    version: "0.1.0"
    category: inference
    gpu: "no"
    description: "GLiNER2 NER + relation extraction (AdaExtract GLINER_EXTRACTION provider, CPU)"
    tags: [extraction, ner, relation-extraction, gliner, gliner2, cpu]
  - name: wechat
    version: "latest"
    category: tools
    gpu: "no"
    description: "Personal WeChat REST API via WeChatFerry (per-person, Windows VM)"
    tags: [wechat, messaging, personal, windows-only]
  - name: claudecode
    version: "0.1.0"
    category: agent-runtime
    gpu: "no"
    description: "Headless Claude Code agent-runtime (BYOC: agent + model on your own node via the fabric proxy)"
    tags: [agent, claude-code, byoc]
  - name: livekit
    version: "v1.13.3"
    category: media
    gpu: "no"
    description: "LiveKit WebRTC SFU hosting AceTeam voice huddles (team-chat calls) on your node"
    tags: [webrtc, sfu, voice, huddle, media]
  - name: meeting
    version: "0.1.0"
    category: media
    gpu: "no"
    description: "Meeting notetaker media stack: Chromium + Xvfb + PulseAudio + ffmpeg + session supervisor (records call audio, no host media stack)"
    tags: [meeting, notetaker, media, chromium]
  - name: gotenberg
    version: "8"
    category: tools
    gpu: "no"
    description: "Document conversion API (LibreOffice Office->PDF + Chromium HTML->PDF); Sovereign Sign's sovereign DOCX->PDF conversion (#5793)"
    tags: [conversion, pdf, docx, office, libreoffice, chromium, html-to-pdf, sovereign-sign, cpu]
  - name: kokoro
    version: "0.1.0"
    category: inference
    gpu: optional
    description: "Kokoro text-to-speech (Kokoro-82M): OpenAI-compatible synthesis, EN + ZH voices, opus/mp3, content-addressed cache + per-item receipts; backs the fabric tts engine (#11)"
    tags: [tts, text-to-speech, speech-synthesis, kokoro, audio, openai-compatible, english, mandarin, opus, mp3, cpu, gpu]
  - name: nvr
    version: "0.1.0"
    category: media
    gpu: "no"
    description: "Self-hosted camera NVR: docker-wyze-bridge (Wyze TUTK->RTSP) + Frigate (continuous recording + local object detection); local/NAS/volume storage, Intel-iGPU OpenVINO detection (citadel-cli#597)"
    tags: [nvr, camera, frigate, wyze, surveillance, recording, object-detection, openvino, media, cpu]
