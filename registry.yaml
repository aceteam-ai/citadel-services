version: 1
services:
  - name: ollama
    version: "latest"
    category: inference
    gpu: optional
    description: "Local LLM runner with model management"
  - name: vllm
    version: "0.23.0"
    category: inference
    gpu: required
    description: "High-performance LLM inference with PagedAttention"
  - name: llamacpp
    version: "latest"
    category: inference
    gpu: optional
    description: "Lightweight GGUF model inference server"
  - name: tei
    version: "1.9"
    category: inference
    gpu: required
    description: "Text embeddings (HF TEI), OpenAI-compatible /v1/embeddings"
    tags: [embeddings, inference, openai-compatible, multilingual, gpu]
  - name: gliner2
    version: "0.1.0"
    category: inference
    gpu: "no"
    description: "GLiNER2 NER + relation extraction (AdaExtract GLINER_EXTRACTION provider, CPU)"
    tags: [extraction, ner, relation-extraction, gliner, gliner2, cpu]
  - name: wechat
    version: "latest"
    category: tools
    gpu: "no"
    description: "Personal WeChat REST API via WeChatFerry (per-person, Windows VM)"
    tags: [wechat, messaging, personal, windows-only]
  - name: claudecode
    version: "0.1.0"
    category: agent-runtime
    gpu: "no"
    description: "Headless Claude Code agent-runtime (BYOC: agent + model on your own node via the fabric proxy)"
    tags: [agent, claude-code, byoc]
  - name: livekit
    version: "v1.13.3"
    category: media
    gpu: "no"
    description: "LiveKit WebRTC SFU hosting AceTeam voice huddles (team-chat calls) on your node"
    tags: [webrtc, sfu, voice, huddle, media]
