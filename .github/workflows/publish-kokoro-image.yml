# Build and publish the Kokoro TTS service image to GitHub Container Registry.
#
# Publishes the default CPU-torch image as
# ghcr.io/aceteam-ai/kokoro-service:latest, the tag referenced by
# services/kokoro/compose.yml and by citadel-cli's embedded tts compose. The
# :cuda variant is intentionally out of scope here (built separately once a GPU
# node is reserved, per services/kokoro/compose.gpu.yml).
#
# Auth uses the built-in GITHUB_TOKEN with packages:write, so no PAT or custom
# secret is required.
name: publish-kokoro-image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "services/kokoro/build/**"
      - ".github/workflows/publish-kokoro-image.yml"

env:
  IMAGE: ghcr.io/aceteam-ai/kokoro-service

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # :latest plus a short-SHA tag for traceability.
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # Default build: no build-args, so the Dockerfile's ARG TORCH_BACKEND=cpu
      # default produces the lean CPU-torch image.
      - name: Build and push CPU image
        uses: docker/build-push-action@v6
        with:
          context: services/kokoro/build
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
