services:
  my-service:
    image: example/my-service:latest
    ports:
      - "8080:8080"
    environment:
      - MY_CONFIG_VAR=${MY_CONFIG_VAR:-default-value}
    volumes:
      - ~/citadel-cache/my-service:/data
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
